<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WM 2026 · Live</title>
<style>
  :root{--bg:#0B0E10;--panel:#14181C;--panel-2:#191E23;--line:#232A30;--chalk:#F2F4F3;--muted:#8A969E;--muted-2:#5B656C;--live:#FF3B30;--gold:#E0B243;--qual:#2E7D5B;--shadow:0 1px 0 rgba(255,255,255,.03),0 12px 30px rgba(0,0,0,.45);--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--sys:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--chalk);font-family:var(--sys);}
  body{padding:env(safe-area-inset-top) max(14px,env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-right));max-width:760px;margin:0 auto;-webkit-font-smoothing:antialiased;}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 72%,transparent);padding:14px 0 10px;display:flex;align-items:center;gap:12px;}
  .wordmark{font-weight:800;letter-spacing:.14em;font-size:13px;text-transform:uppercase;line-height:1;}
  .wordmark small{display:block;color:var(--muted);font-weight:600;letter-spacing:.22em;font-size:9.5px;margin-top:3px;}
  .status{margin-left:auto;text-align:right;font-size:11px;color:var(--muted);line-height:1.5;max-width:210px;}
  .status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--qual);margin-right:5px;vertical-align:middle;}
  .status .dot.err{background:var(--live);}
  #refresh{border:1px solid var(--line);background:var(--panel);color:var(--chalk);width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer;flex:none;display:grid;place-items:center;transition:transform .4s ease,background .15s;}
  #refresh:active{background:var(--panel-2);}#refresh.spin{transform:rotate(360deg);}
  .seg{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;margin:4px 0 14px;}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-family:var(--sys);font-weight:700;font-size:13px;padding:9px 0;border-radius:9px;cursor:pointer;}
  .seg button.on{background:var(--panel-2);color:var(--chalk);box-shadow:var(--shadow);}
  .datebar{display:flex;align-items:center;gap:9px;margin:0 0 18px;}
  .datebar .nav{width:40px;height:40px;flex:none;border:1px solid var(--line);background:var(--panel);color:var(--chalk);border-radius:11px;font-size:19px;display:grid;place-items:center;cursor:pointer;}
  .datebar .nav:active{background:var(--panel-2);}
  .datebar .nav.off{opacity:.28;pointer-events:none;}
  .datebar .dlabel{flex:1;text-align:center;font-weight:700;font-size:15px;}
  .datebar .dlabel .sub{display:block;font-family:var(--mono);font-size:10px;color:var(--muted-2);letter-spacing:.1em;margin-top:2px;text-transform:uppercase;}
  .datebar .today{flex:none;border:1px solid var(--line);background:transparent;color:var(--muted);font-weight:700;font-size:11px;letter-spacing:.04em;padding:0 11px;height:40px;border-radius:11px;cursor:pointer;text-transform:uppercase;}
  .datebar .today.hide{display:none;}
  .eyebrow{display:flex;align-items:center;gap:9px;margin:24px 2px 12px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .eyebrow:first-child{margin-top:0;}.eyebrow .rule{flex:1;height:1px;background:var(--line);}
  .eyebrow .live-tag{color:var(--live);display:inline-flex;align-items:center;gap:6px;}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.7);}}
  .match{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;cursor:pointer;transition:transform .08s ease;}
  .match:active{transform:scale(.985);}
  .match.islive{border-color:#3a2424;background:linear-gradient(180deg,#181113,var(--panel));}
  .team{display:flex;flex-direction:column;gap:6px;min-width:0;}
  .team.away{align-items:flex-end;text-align:right;}
  .team .logo{width:30px;height:30px;object-fit:contain;}
  .team .nm{font-weight:700;font-size:14px;line-height:1.15;}
  .team .ab{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em;}
  .team .row{display:flex;align-items:center;gap:8px;min-width:0;}.team.away .row{flex-direction:row-reverse;}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:78px;padding:0 4px;}
  .score{font-family:var(--mono);font-weight:700;font-size:26px;letter-spacing:.04em;font-variant-numeric:tabular-nums;line-height:1;display:flex;gap:7px;align-items:baseline;}
  .score .sep{color:var(--muted-2);font-size:18px;}
  .clock{font-family:var(--mono);font-size:11px;margin-top:7px;color:var(--muted);display:inline-flex;align-items:center;gap:5px;}
  .clock.live{color:var(--live);}.clock.live .pulse{width:6px;height:6px;}
  .nm.win{color:var(--chalk);}.nm.lose{color:var(--muted);}
  .groups{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:560px){.groups{grid-template-columns:1fr 1fr;}}
  .grp{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
  .grp h3{margin:0;padding:11px 13px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);font-weight:700;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 6px;text-align:center;}
  th{font-size:9.5px;letter-spacing:.06em;color:var(--muted-2);font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--line);}
  th.team,td.team{text-align:left;padding-left:13px;}
  td.team{display:flex;align-items:center;gap:8px;font-weight:600;}
  td.team img{width:18px;height:18px;object-fit:contain;flex:none;}
  td.team span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  td.pts{font-family:var(--mono);font-weight:700;font-variant-numeric:tabular-nums;color:var(--chalk);}
  td.num{font-family:var(--mono);color:var(--muted);font-variant-numeric:tabular-nums;}
  tbody tr{border-bottom:1px solid rgba(35,42,48,.5);}tbody tr:last-child{border-bottom:0;}
  tbody tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--gold);}
  tbody tr.q2 td:first-child{box-shadow:inset 3px 0 0 var(--qual);}
  .pos{font-family:var(--mono);color:var(--muted-2);font-size:11px;}
  .empty{border:1px dashed var(--line);border-radius:14px;padding:22px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.5;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:14px 2px 0;font-size:11px;color:var(--muted);}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle;}
  .hide{display:none;}
  footer{margin-top:30px;text-align:center;color:var(--muted-2);font-size:10.5px;line-height:1.6;}
  /* bottom sheet */
  #scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;}
  #scrim.show{opacity:1;pointer-events:auto;}
  #sheet{position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:0 auto;background:var(--panel);border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid var(--line);border-bottom:0;transform:translateY(101%);transition:transform .3s cubic-bezier(.22,1,.36,1);z-index:51;max-height:92vh;display:flex;flex-direction:column;}
  #sheet.show{transform:translateY(0);}
  .grab{width:38px;height:5px;border-radius:3px;background:#2c343b;margin:9px auto 2px;flex:none;}
  .shead{display:flex;align-items:center;gap:12px;padding:8px 18px 14px;border-bottom:1px solid var(--line);flex:none;}
  .shead .vs{flex:1;text-align:center;}
  .shead .vs .t{font-weight:800;font-size:17px;letter-spacing:-.01em;}
  .shead .vs .s{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:3px;}
  .sclose{width:34px;height:34px;border-radius:50%;border:0;background:var(--panel-2);color:var(--chalk);font-size:15px;cursor:pointer;flex:none;}
  .sbody{overflow:auto;padding:6px 18px calc(26px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch;}
  .sec{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:22px 0 10px;display:flex;align-items:center;gap:9px;}
  .sec .rule{flex:1;height:1px;background:var(--line);}
  /* meta */
  .meta{font-size:12.5px;color:var(--muted);line-height:1.75;}
  .meta b{color:var(--chalk);font-weight:600;}
  /* events */
  .ev{display:flex;gap:11px;align-items:center;padding:8px 2px;border-bottom:1px solid rgba(35,42,48,.5);}
  .ev:last-child{border-bottom:0;}
  .ev .m{font-family:var(--mono);font-size:12px;color:var(--gold);width:36px;flex:none;font-variant-numeric:tabular-nums;}
  .ev .ic{width:18px;flex:none;text-align:center;font-size:13px;}
  .ev .tx{flex:1;font-size:13.5px;}
  .ev .tx .who{font-weight:600;}
  .ev .tx .tm{color:var(--muted-2);font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;margin-left:6px;text-transform:uppercase;}
  /* stats */
  .st{margin:13px 0;}
  .st-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .st-top .v{font-family:var(--mono);font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;min-width:42px;}
  .st-top .v.a{text-align:right;}
  .st-top .lbl{flex:1;text-align:center;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:700;}
  .st-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;margin-top:6px;background:var(--line);}
  .st-bar .h{background:var(--chalk);}
  .st-bar .a{background:var(--muted-2);margin-left:auto;}
  /* lineups */
  .lu-team{margin-top:18px;}
  .lu-team h4{display:flex;align-items:center;gap:9px;margin:0 0 1px;font-size:16px;font-weight:700;letter-spacing:-.01em;}
  .lu-team h4 img{width:22px;height:22px;object-fit:contain;}
  .lu-form{font-family:var(--mono);font-size:12px;color:var(--gold);letter-spacing:.16em;margin:0 0 8px 31px;}
  .lu-subh{color:var(--muted-2);font-size:10.5px;text-transform:uppercase;letter-spacing:.16em;font-weight:700;margin:16px 0 2px;}
  .lu-row{display:flex;align-items:center;gap:13px;padding:8px 2px;border-bottom:1px solid rgba(35,42,48,.55);}
  .lu-row:last-child{border-bottom:0;}
  .lu-num{font-family:var(--mono);font-size:13px;color:var(--muted);width:26px;text-align:center;font-variant-numeric:tabular-nums;flex:none;}
  .lu-name{flex:1;font-weight:600;font-size:15px;letter-spacing:-.012em;}
  .lu-row.bench .lu-name{font-weight:500;color:var(--muted);}
  .lu-pos{font-family:var(--mono);font-size:10.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.07em;flex:none;}
  .lu-note{padding:30px 8px;text-align:center;color:var(--muted);font-size:13px;line-height:1.5;}
</style>
</head>
<body>
<header>
  <div class="wordmark">WM 2026<small>USA · CAN · MEX</small></div>
  <div class="status" id="status"><span class="dot" id="sdot"></span><span id="stext">lade …</span></div>
  <button id="refresh" aria-label="Aktualisieren">↻</button>
</header>
<div class="seg" role="tablist">
  <button id="tab-live" class="on">Live &amp; Heute</button>
  <button id="tab-groups">Gruppen</button>
</div>
<section id="view-live">
  <div class="datebar">
    <button class="nav" id="prev" aria-label="Tag zurück">‹</button>
    <div class="dlabel" id="dlabel">—<span class="sub" id="dsub"></span></div>
    <button class="today hide" id="today">Heute</button>
    <button class="nav" id="next" aria-label="Tag vor">›</button>
  </div>
  <div id="live-wrap"></div>
  <div id="day-wrap"></div>
</section>
<section id="view-groups" class="hide">
  <div class="groups" id="groups"></div>
  <div class="legend"><span><i style="background:var(--gold)"></i>Gruppenerster</span><span><i style="background:var(--qual)"></i>Gruppenzweiter</span></div>
</section>
<footer>Quelle: ESPN · ‹ › blättert durch alle WM-Tage · Auto-Refresh alle 5 Sek. · Spiel antippen für alle Stats<br>Funktioniert nur als gehostete Seite (https).</footer>

<div id="scrim"></div>
<div id="sheet" role="dialog" aria-modal="true"><div class="grab"></div><div class="shead" id="shead"></div><div class="sbody" id="sbody"></div></div>

<script>
const BASE="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard";
const SUM_URL="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary";
const STAND_URL="https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings";
const SCORE_MS=5000, STAND_MS=60000;
const WM_START=new Date(2026,5,11), WM_END=new Date(2026,6,19);
let selDate=new Date();
let lastGood={events:null,groups:null},sTimer=null,gTimer=null;

const $=s=>document.querySelector(s);
const esc=s=>(s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const img=u=>u?`<img class="logo" src="${esc(u)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`:"";
const fmtT=d=>d.toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"});
const fmtS=d=>d.toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const ymd=d=>""+d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
const isToday=d=>ymd(d)===ymd(new Date());
const numv=v=>{const n=parseFloat(String(v??"").replace(/[^0-9.\-]/g,""));return Number.isFinite(n)?n:null;};
const pretty=s=>String(s||"").replace(/([a-z])([A-Z])/g,"$1 $2").replace(/^./,c=>c.toUpperCase());

async function getJSON(u){const r=await fetch(u,{cache:"no-store"});if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}

async function loadScores(manual){
  const b=$("#refresh");if(manual){b.classList.add("spin");setTimeout(()=>b.classList.remove("spin"),500);}
  try{const sb=await getJSON(BASE+"?dates="+ymd(selDate));lastGood.events=sb.events||[];render();setStatus(true);}
  catch(e){render();setStatus(false);}
}
async function loadStandings(){try{const st=await getJSON(STAND_URL);lastGood.groups=parseStandings(st);render();}catch(e){}}

function parseStandings(data){
  let groups=[];const push=(n,e)=>{if(e&&e.length)groups.push({name:clean(n),rows:e.map(row)});};
  if(Array.isArray(data.children)&&data.children.length){data.children.forEach(c=>push(c.name||c.abbreviation,c?.standings?.entries||c?.standings?.[0]?.entries));}
  else if(data?.standings?.entries){push(data.name||"Tabelle",data.standings.entries);}
  groups.forEach(g=>g.rows.sort((a,b)=>(a.rank||99)-(b.rank||99)||b.pts-a.pts||b.gd-a.gd));
  groups.sort((a,b)=>a.name.localeCompare(b.name));return groups;
}
const clean=n=>n?n.replace(/^.*?(Group|Gruppe)\s*/i,"Gruppe "):"Gruppe";
function statBy(s,names){for(const x of s||[]){const k=(x.name||x.abbreviation||x.shortDisplayName||"").toLowerCase();if(names.includes(k)){const v=x.value??parseFloat(x.displayValue);return Number.isFinite(v)?v:(x.displayValue??0);}}return 0;}
function row(e){const t=e.team||{},s=e.stats||[];return{name:t.shortDisplayName||t.displayName||t.abbreviation||"—",logo:t.logos?.[0]?.href||t.logo||"",rank:statBy(s,["rank"])||0,pld:statBy(s,["gamesplayed","games"]),w:statBy(s,["wins"]),d:statBy(s,["ties","draws"]),l:statBy(s,["losses"]),gf:statBy(s,["pointsfor","goalsfor"]),ga:statBy(s,["pointsagainst","goalsagainst"]),gd:statBy(s,["pointdifferential","goaldifference"]),pts:statBy(s,["points","total"])||(statBy(s,["wins"])*3+statBy(s,["ties","draws"]))};}

function card(ev){
  const c=ev.competitions?.[0];if(!c)return"";const cs=c.competitors||[];
  const h=cs.find(x=>x.homeAway==="home")||cs[0]||{},a=cs.find(x=>x.homeAway==="away")||cs[1]||{};
  const st=ev.status?.type||{},state=st.state,live=state==="in",detail=st.shortDetail||st.detail||"";
  const tb=(x,side)=>{const t=x.team||{};let cl="";if(state==="post")cl=x.winner?"win":"lose";
    return `<div class="team ${side}"><div class="row">${img(t.logos?.[0]?.href||t.logo)}<span class="nm ${cl}">${esc(t.shortDisplayName||t.displayName||"—")}</span></div><span class="ab">${esc(t.abbreviation||"")}</span></div>`;};
  let center;
  if(state==="pre"){center=`<div class="center"><div class="score" style="font-size:15px;color:var(--muted)">${fmtT(new Date(ev.date))}</div><div class="clock">angesetzt</div></div>`;}
  else{center=`<div class="center"><div class="score"><span>${esc(h.score??0)}</span><span class="sep">:</span><span>${esc(a.score??0)}</span></div><div class="clock ${live?"live":""}">${live?'<span class="pulse"></span>':""}${esc(detail)}</div></div>`;}
  return `<div class="match ${live?"islive":""}" onclick="openLineup('${esc(ev.id)}')">${tb(h,"home")}${center}${tb(a,"away")}</div>`;
}

function dateLabel(){return {main:(isToday(selDate)?"Heute":selDate.toLocaleDateString("de-CH",{weekday:"long"})),sub:selDate.toLocaleDateString("de-CH",{day:"numeric",month:"long"})};}
function renderDateBar(){const l=dateLabel();$("#dlabel").innerHTML=`${l.main}<span class="sub">${l.sub}</span>`;$("#today").classList.toggle("hide",isToday(selDate));
  const d0=new Date(selDate);d0.setDate(d0.getDate()-1);const d1=new Date(selDate);d1.setDate(d1.getDate()+1);
  $("#prev").classList.toggle("off",ymd(d0)<ymd(WM_START));$("#next").classList.toggle("off",ymd(d1)>ymd(WM_END));}

function render(){
  renderDateBar();
  const evs=lastGood.events||[];
  const L=evs.filter(e=>e.status?.type?.state==="in");
  const O=evs.filter(e=>e.status?.type?.state!=="in").sort((a,b)=>new Date(a.date)-new Date(b.date));
  $("#live-wrap").innerHTML=L.length?`<div class="eyebrow"><span class="live-tag"><span class="pulse"></span>Live jetzt</span><span class="rule"></span></div>`+L.map(card).join(""):"";
  const dw=$("#day-wrap"),lab=dateLabel();
  const head=`<div class="eyebrow">${esc(lab.main)} · ${esc(lab.sub)}<span class="rule"></span></div>`;
  if(O.length)dw.innerHTML=head+O.map(card).join("");
  else if(!L.length)dw.innerHTML=head+`<div class="empty">Keine Spiele an diesem Tag.<br>Mit ‹ › einen anderen Tag wählen.</div>`;
  else dw.innerHTML="";
  const gw=$("#groups"),g=lastGood.groups||[];
  gw.innerHTML=g.length?g.map(gtable).join(""):`<div class="empty" style="grid-column:1/-1">Gruppentabellen gerade nicht abrufbar.</div>`;
}
function gtable(g){
  const rows=g.rows.map((r,i)=>{const q=i===0?"q1":(i===1?"q2":"");
    return `<tr class="${q}"><td class="team"><span class="pos">${i+1}</span>${img(r.logo).replace('class="logo"','')}<span>${esc(r.name)}</span></td><td class="num">${r.pld}</td><td class="num">${r.w}-${r.d}-${r.l}</td><td class="num">${r.gf}:${r.ga}</td><td class="num">${r.gd>0?"+":""}${r.gd}</td><td class="pts">${r.pts}</td></tr>`;}).join("");
  return `<div class="grp"><h3>${esc(g.name)}</h3><table><thead><tr><th class="team">Team</th><th>Sp</th><th>S-U-N</th><th>Tore</th><th>TD</th><th>Pkt</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function setStatus(ok){const d=$("#sdot"),t=$("#stext");if(!ok){d.className="dot err";t.textContent="API nicht erreichbar — letzter Stand";return;}d.className="dot";t.textContent="aktualisiert "+fmtS(new Date());}

/* ===================== MATCH SHEET ===================== */
function openSheet(){$("#scrim").classList.add("show");$("#sheet").classList.add("show");document.body.style.overflow="hidden";$("#sbody").scrollTop=0;}
function closeSheet(){$("#scrim").classList.remove("show");$("#sheet").classList.remove("show");document.body.style.overflow="";}
$("#scrim").onclick=closeSheet;
const SECT=t=>`<div class="sec">${esc(t)}<span class="rule"></span></div>`;

async function openLineup(id){
  const ev=(lastGood.events||[]).find(e=>e.id===id);
  $("#shead").innerHTML=sheetHead(ev);
  $("#sbody").innerHTML=`<div class="lu-note">Lade Spieldaten …</div>`;
  openSheet();
  try{
    const d=await getJSON(SUM_URL+"?event="+encodeURIComponent(id));
    const ctx=buildCtx(d,ev);
    $("#shead").innerHTML=sheetHead(ev,ctx);
    let html=metaBlock(ctx)+eventsBlock(ctx)+statsBlock(ctx)+lineupBlock(ctx);
    $("#sbody").innerHTML=html||`<div class="lu-note">Für dieses Spiel sind noch keine Detaildaten verfügbar.</div>`;
  }catch(e){$("#sbody").innerHTML=`<div class="lu-note">Spieldaten konnten nicht geladen werden.<br>Tippe das Spiel später nochmal an.</div>`;}
}

function buildCtx(d,ev){
  const comp=d?.header?.competitions?.[0]||ev?.competitions?.[0]||{};
  const cs=comp.competitors||[];
  const h=cs.find(x=>x.homeAway==="home")||cs[0]||{},a=cs.find(x=>x.homeAway==="away")||cs[1]||{};
  const side={};if(h.team?.id)side[h.team.id]="home";if(a.team?.id)side[a.team.id]="away";
  const T=x=>({id:x.team?.id,name:x.team?.displayName||x.team?.shortDisplayName||"",abbr:x.team?.abbreviation||"",logo:x.team?.logos?.[0]?.href||x.team?.logo||"",score:x.score});
  // stats
  const stats=[];const map={};
  (d?.boxscore?.teams||[]).forEach(te=>{const s=side[te.team?.id];if(!s)return;
    (te.statistics||[]).forEach(st=>{const key=st.name||st.label;if(!map[key])map[key]={label:st.label||pretty(st.name),order:Object.keys(map).length,home:"",away:""};map[key][s]=st.displayValue??st.value??"";});});
  Object.values(map).sort((x,y)=>x.order-y.order).forEach(m=>{if(m.home!==""||m.away!=="")stats.push(m);});
  // events
  let events=[];
  const evs=d?.keyEvents||d?.commentary?.filter?.(c=>c.play)||[];
  (d?.keyEvents||[]).forEach(k=>{
    const min=k.clock?.displayValue||(k.time?.displayValue)||"";
    const tp=(k.type?.text||k.type?.name||"").toString();
    const who=(k.athletesInvolved&&k.athletesInvolved[0]&&(k.athletesInvolved[0].displayName||k.athletesInvolved[0].fullName))||k.shortText||k.text||"";
    const s=side[k.team?.id]||"";
    events.push({min,tp,who,abbr:s==="home"?T(h).abbr:(s==="away"?T(a).abbr:""),txt:k.text||""});
  });
  // meta
  const gi=d?.gameInfo||{};
  const officials=(gi.officials||[]).map(o=>({n:o.displayName||o.fullName||o.name,r:o.position?.displayName||o.position?.name||""}));
  const note=(comp.notes&&comp.notes[0]&&(comp.notes[0].headline||comp.notes[0].text))||"";
  const meta={
    stage:note,
    venue:gi.venue?.fullName||comp.venue?.fullName||"",
    city:[gi.venue?.address?.city,gi.venue?.address?.country].filter(Boolean).join(", "),
    attendance:(comp.attendance||gi.attendance)||null,
    officials,
    date:ev?.date?new Date(ev.date):null
  };
  return {h:T(h),a:T(a),status:(d?.header?.competitions?.[0]?.status?.type)||ev?.status?.type||{},stats,events,meta,lineups:parseLineups(d,side)};
}

function sheetHead(ev,ctx){
  const c=ev?.competitions?.[0];const cs=c?.competitors||[];
  const h=cs.find(x=>x.homeAway==="home")||cs[0]||{},a=cs.find(x=>x.homeAway==="away")||cs[1]||{};
  const st=ev?.status?.type||{};const state=st.state;
  const sc=state==="pre"?fmtT(new Date(ev.date)):`${h.score??0} : ${a.score??0}`;
  const sub=st.shortDetail||st.detail||"";
  return `<button class="sclose" onclick="closeSheet()" aria-label="Schließen">✕</button>
    <div class="vs"><div class="t">${esc(h.team?.abbreviation||h.team?.shortDisplayName||"")} – ${esc(a.team?.abbreviation||a.team?.shortDisplayName||"")}</div><div class="s">${esc(sc)} · ${esc(sub)}</div></div>
    <div style="width:34px;flex:none"></div>`;
}

function metaBlock(c){
  const m=c.meta;const L=[];
  if(m.stage)L.push(`<b>${esc(m.stage)}</b>`);
  if(m.date)L.push(`${esc(m.date.toLocaleDateString("de-CH",{weekday:"long",day:"numeric",month:"long"}))} · ${esc(fmtT(m.date))}`);
  if(m.venue)L.push(`${esc(m.venue)}${m.city?" · "+esc(m.city):""}`);
  if(m.attendance)L.push(`Zuschauer: <b>${esc(Number(m.attendance).toLocaleString("de-CH"))}</b>`);
  if(m.officials.length)L.push(`Schiri: ${m.officials.map(o=>esc(o.n)+(o.r?` <span style="color:var(--muted-2)">(${esc(o.r)})</span>`:"")).join(" · ")}`);
  if(!L.length)return "";
  return SECT("Spiel")+`<div class="meta">${L.join("<br>")}</div>`;
}

const EVICON={goal:"⚽","own goal":"⚽","penalty - scored":"⚽","penalty goal":"⚽","yellow card":"🟨","red card":"🟥","yellow red card":"🟥","substitution":"🔁","penalty - missed":"✖︎"};
function eventsBlock(c){
  if(!c.events.length)return "";
  const rows=c.events.map(e=>{
    const k=(e.tp||"").toLowerCase();let ic=EVICON[k]||"•";
    if(k.includes("goal"))ic="⚽";else if(k.includes("yellow")&&k.includes("red"))ic="🟥";else if(k.includes("yellow"))ic="🟨";else if(k.includes("red"))ic="🟥";else if(k.includes("sub"))ic="🔁";
    const main=e.who||e.tp||e.txt;
    return `<div class="ev"><span class="m">${esc(e.min||"")}</span><span class="ic">${ic}</span><span class="tx"><span class="who">${esc(main)}</span>${e.tp?`<span class="tm">${esc(e.tp)}</span>`:""}${e.abbr?`<span class="tm">${esc(e.abbr)}</span>`:""}</span></div>`;
  }).join("");
  return SECT("Tore & Karten")+rows;
}

const STAT_DE={possessionPct:"Ballbesitz %",totalShots:"Schüsse",shotsOnTarget:"Schüsse aufs Tor",wonCorners:"Ecken",foulsCommitted:"Fouls",offsides:"Abseits",yellowCards:"Gelbe Karten",redCards:"Rote Karten",saves:"Paraden",totalPasses:"Pässe",accuratePasses:"Pässe genau",passPct:"Passquote %",totalCrosses:"Flanken",effectiveClearance:"Klärungen",blockedShots:"Geblockte Schüsse",totalTackles:"Zweikämpfe"};
function statsBlock(c){
  if(!c.stats.length)return "";
  const rows=c.stats.map(s=>{
    const lbl=STAT_DE[s.label]||STAT_DE[s.order]||(s.label&&!/^[a-z]+[A-Z]/.test(s.label)?s.label:STAT_DE[s.key])||s.label;
    const label=STAT_DE[Object.keys(STAT_DE).find(k=>k===s.key)]||s.label||"";
    const hN=numv(s.home),aN=numv(s.away);let bar="";
    if(hN!==null&&aN!==null&&(hN+aN)>0){const hp=Math.round(hN/(hN+aN)*100);bar=`<div class="st-bar"><div class="h" style="width:${hp}%"></div><div class="a" style="width:${100-hp}%"></div></div>`;}
    return `<div class="st"><div class="st-top"><span class="v">${esc(s.home||"–")}</span><span class="lbl">${esc(s.label||"")}</span><span class="v a">${esc(s.away||"–")}</span></div>${bar}</div>`;
  }).join("");
  return SECT("Statistik")+rows;
}

function parseLineups(d,side){
  const rs=d?.rosters||[];
  return rs.map(r=>({
    side:r.homeAway||(side&&side[r.team?.id])||"",
    name:r.team?.displayName||r.team?.shortDisplayName||r.team?.name||"",
    logo:r.team?.logo||r.team?.logos?.[0]?.href||"",
    formation:(typeof r.formation==="string"?r.formation:(r.formation?.name||r.formation?.formation||"")),
    players:(r.roster||[]).map(p=>({starter:!!p.starter,num:(p.jersey??p.athlete?.jersey??""),pname:p.athlete?.displayName||p.athlete?.shortName||p.athlete?.fullName||"—",pos:(p.position?.abbreviation||p.position?.displayName||p.position?.name||"")}))
  })).sort((a,b)=>({home:0,away:1}[a.side]??9)-({home:0,away:1}[b.side]??9));
}
function lineupBlock(c){
  if(!c.lineups.length)return "";
  return SECT("Aufstellungen")+c.lineups.map(teamBlock).join("");
}
function teamBlock(t){
  const starters=t.players.filter(p=>p.starter),bench=t.players.filter(p=>!p.starter);
  const line=(p,cls)=>`<div class="lu-row ${cls}"><span class="lu-num">${esc(p.num)}</span><span class="lu-name">${esc(p.pname)}</span><span class="lu-pos">${esc(p.pos)}</span></div>`;
  let html=`<div class="lu-team"><h4>${img(t.logo).replace('class="logo"','')}${esc(t.name)}</h4>`;
  if(t.formation)html+=`<div class="lu-form">${esc(t.formation)}</div>`;
  html+=(starters.length?starters:t.players).map(p=>line(p,"")).join("");
  if(bench.length)html+=`<div class="lu-subh">Auswechselbank</div>`+bench.map(p=>line(p,"bench")).join("");
  return html+`</div>`;
}

/* ===================== nav / tabs / timers ===================== */
function shift(n){const d=new Date(selDate);d.setDate(d.getDate()+n);if(ymd(d)<ymd(WM_START)||ymd(d)>ymd(WM_END))return;selDate=d;lastGood.events=null;loadScores(true);}
$("#prev").onclick=()=>shift(-1);$("#next").onclick=()=>shift(1);
$("#today").onclick=()=>{selDate=new Date();lastGood.events=null;loadScores(true);};
function view(w){const l=w==="live";$("#view-live").classList.toggle("hide",!l);$("#view-groups").classList.toggle("hide",l);$("#tab-live").classList.toggle("on",l);$("#tab-groups").classList.toggle("on",!l);}
$("#tab-live").onclick=()=>view("live");$("#tab-groups").onclick=()=>view("groups");$("#refresh").onclick=()=>{loadScores(true);loadStandings();};
function start(){clearInterval(sTimer);clearInterval(gTimer);sTimer=setInterval(()=>{if(!document.hidden)loadScores(false);},SCORE_MS);gTimer=setInterval(()=>{if(!document.hidden)loadStandings();},STAND_MS);}
document.addEventListener("visibilitychange",()=>{if(!document.hidden){loadScores(false);loadStandings();}});
if(ymd(selDate)>ymd(WM_END))selDate=new Date(WM_END);
loadScores(true);loadStandings();start();
</script>
