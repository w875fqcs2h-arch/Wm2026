<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WM 2026 · Live</title>
<style>
  :root{--bg:#0B0E10;--panel:#14181C;--panel-2:#191E23;--line:#232A30;--chalk:#F2F4F3;--muted:#8A969E;--muted-2:#5B656C;--live:#FF3B30;--gold:#E0B243;--qual:#2E7D5B;--shadow:0 1px 0 rgba(255,255,255,.03),0 12px 30px rgba(0,0,0,.45);--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--sys:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--chalk);font-family:var(--sys);}
  body{padding:env(safe-area-inset-top) max(14px,env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-right));max-width:760px;margin:0 auto;-webkit-font-smoothing:antialiased;}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 72%,transparent);padding:14px 0 10px;display:flex;align-items:center;gap:12px;}
  .wordmark{font-weight:800;letter-spacing:.14em;font-size:13px;text-transform:uppercase;line-height:1;}
  .wordmark small{display:block;color:var(--muted);font-weight:600;letter-spacing:.22em;font-size:9.5px;margin-top:3px;}
  .status{margin-left:auto;text-align:right;font-size:11px;color:var(--muted);line-height:1.5;max-width:210px;}
  .status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--qual);margin-right:5px;vertical-align:middle;}
  .status .dot.err{background:var(--live);}
  #refresh{border:1px solid var(--line);background:var(--panel);color:var(--chalk);width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer;flex:none;display:grid;place-items:center;transition:transform .4s ease,background .15s;}
  #refresh:active{background:var(--panel-2);}#refresh.spin{transform:rotate(360deg);}
  .seg{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;margin:4px 0 14px;}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-family:var(--sys);font-weight:700;font-size:13px;padding:9px 0;border-radius:9px;cursor:pointer;}
  .seg button.on{background:var(--panel-2);color:var(--chalk);box-shadow:var(--shadow);}
  .datebar{display:flex;align-items:center;gap:9px;margin:0 0 18px;}
  .datebar .nav{width:40px;height:40px;flex:none;border:1px solid var(--line);background:var(--panel);color:var(--chalk);border-radius:11px;font-size:19px;display:grid;place-items:center;cursor:pointer;}
  .datebar .nav:active{background:var(--panel-2);}
  .datebar .nav.off{opacity:.28;pointer-events:none;}
  .datebar .dlabel{flex:1;text-align:center;font-weight:700;font-size:15px;letter-spacing:.01em;}
  .datebar .dlabel .sub{display:block;font-family:var(--mono);font-size:10px;color:var(--muted-2);letter-spacing:.1em;margin-top:2px;text-transform:uppercase;}
  .datebar .today{flex:none;border:1px solid var(--line);background:transparent;color:var(--muted);font-weight:700;font-size:11px;letter-spacing:.04em;padding:0 11px;height:40px;border-radius:11px;cursor:pointer;text-transform:uppercase;}
  .datebar .today.hide{display:none;}
  .eyebrow{display:flex;align-items:center;gap:9px;margin:24px 2px 12px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .eyebrow:first-child{margin-top:0;}.eyebrow .rule{flex:1;height:1px;background:var(--line);}
  .eyebrow .live-tag{color:var(--live);display:inline-flex;align-items:center;gap:6px;}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.7);}}
  .match{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
  .match.islive{border-color:#3a2424;background:linear-gradient(180deg,#181113,var(--panel));}
  .team{display:flex;flex-direction:column;gap:6px;min-width:0;}
  .team.away{align-items:flex-end;text-align:right;}
  .team .logo{width:30px;height:30px;object-fit:contain;}
  .team .nm{font-weight:700;font-size:14px;line-height:1.15;}
  .team .ab{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em;}
  .team .row{display:flex;align-items:center;gap:8px;min-width:0;}.team.away .row{flex-direction:row-reverse;}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:78px;padding:0 4px;}
  .score{font-family:var(--mono);font-weight:700;font-size:26px;letter-spacing:.04em;font-variant-numeric:tabular-nums;line-height:1;display:flex;gap:7px;align-items:baseline;}
  .score .sep{color:var(--muted-2);font-size:18px;}
  .clock{font-family:var(--mono);font-size:11px;margin-top:7px;color:var(--muted);display:inline-flex;align-items:center;gap:5px;}
  .clock.live{color:var(--live);}.clock.live .pulse{width:6px;height:6px;}
  .nm.win{color:var(--chalk);}.nm.lose{color:var(--muted);}
  .groups{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:560px){.groups{grid-template-columns:1fr 1fr;}}
  .grp{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
  .grp h3{margin:0;padding:11px 13px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);font-weight:700;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 6px;text-align:center;}
  th{font-size:9.5px;letter-spacing:.06em;color:var(--muted-2);font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--line);}
  th.team,td.team{text-align:left;padding-left:13px;}
  td.team{display:flex;align-items:center;gap:8px;font-weight:600;}
  td.team img{width:18px;height:18px;object-fit:contain;flex:none;}
  td.team span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  td.pts{font-family:var(--mono);font-weight:700;font-variant-numeric:tabular-nums;color:var(--chalk);}
  td.num{font-family:var(--mono);color:var(--muted);font-variant-numeric:tabular-nums;}
  tbody tr{border-bottom:1px solid rgba(35,42,48,.5);}tbody tr:last-child{border-bottom:0;}
  tbody tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--gold);}
  tbody tr.q2 td:first-child{box-shadow:inset 3px 0 0 var(--qual);}
  .pos{font-family:var(--mono);color:var(--muted-2);font-size:11px;}
  .empty{border:1px dashed var(--line);border-radius:14px;padding:22px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.5;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:14px 2px 0;font-size:11px;color:var(--muted);}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle;}
  .hide{display:none;}
  footer{margin-top:30px;text-align:center;color:var(--muted-2);font-size:10.5px;line-height:1.6;}
</style>
</head>
<body>
<header>
  <div class="wordmark">WM 2026<small>USA · CAN · MEX</small></div>
  <div class="status" id="status"><span class="dot" id="sdot"></span><span id="stext">lade …</span></div>
  <button id="refresh" aria-label="Aktualisieren">↻</button>
</header>
<div class="seg" role="tablist">
  <button id="tab-live" class="on">Live &amp; Heute</button>
  <button id="tab-groups">Gruppen</button>
</div>
<section id="view-live">
  <div class="datebar">
    <button class="nav" id="prev" aria-label="Tag zurück">‹</button>
    <div class="dlabel" id="dlabel">—<span class="sub" id="dsub"></span></div>
    <button class="today hide" id="today">Heute</button>
    <button class="nav" id="next" aria-label="Tag vor">›</button>
  </div>
  <div id="live-wrap"></div>
  <div id="day-wrap"></div>
</section>
<section id="view-groups" class="hide">
  <div class="groups" id="groups"></div>
  <div class="legend"><span><i style="background:var(--gold)"></i>Gruppenerster</span><span><i style="background:var(--qual)"></i>Gruppenzweiter</span></div>
</section>
<footer>Quelle: ESPN · ‹ › blättert durch alle WM-Tage · Auto-Refresh alle 30 Sek.<br>Funktioniert nur als gehostete Seite (https).</footer>
<script>
const BASE="https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard";
const STAND_URL="https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings";
const REFRESH_MS=30000;
const WM_START=new Date(2026,5,11), WM_END=new Date(2026,6,19);
let selDate=new Date();
let lastGood={events:null,groups:null},timer=null,countdown=REFRESH_MS/1000;

const $=s=>document.querySelector(s);
const esc=s=>(s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const img=u=>u?`<img class="logo" src="${esc(u)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`:"";
const fmt=d=>d.toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"});
const ymd=d=>""+d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
const isToday=d=>ymd(d)===ymd(new Date());
function clampToday(){ if(ymd(selDate)>ymd(WM_END))selDate=new Date(WM_END); }

async function getJSON(u){const r=await fetch(u,{cache:"no-store"});if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}
async function load(manual){
  const b=$("#refresh");if(manual){b.classList.add("spin");setTimeout(()=>b.classList.remove("spin"),500);}
  let ok=true,partial=false;
  try{const sb=await getJSON(BASE+"?dates="+ymd(selDate));lastGood.events=sb.events||[];}catch(e){ok=false;}
  try{const st=await getJSON(STAND_URL);lastGood.groups=parseStandings(st);}catch(e){partial=true;}
  render();setStatus(ok,partial);countdown=REFRESH_MS/1000;
}

function parseStandings(data){
  let groups=[];const push=(n,e)=>{if(e&&e.length)groups.push({name:clean(n),rows:e.map(row)});};
  if(Array.isArray(data.children)&&data.children.length){data.children.forEach(c=>push(c.name||c.abbreviation,c?.standings?.entries||c?.standings?.[0]?.entries));}
  else if(data?.standings?.entries){push(data.name||"Tabelle",data.standings.entries);}
  groups.forEach(g=>g.rows.sort((a,b)=>(a.rank||99)-(b.rank||99)||b.pts-a.pts||b.gd-a.gd));
  groups.sort((a,b)=>a.name.localeCompare(b.name));return groups;
}
const clean=n=>n?n.replace(/^.*?(Group|Gruppe)\s*/i,"Gruppe "):"Gruppe";
function statBy(s,names){for(const x of s||[]){const k=(x.name||x.abbreviation||x.shortDisplayName||"").toLowerCase();if(names.includes(k)){const v=x.value??parseFloat(x.displayValue);return Number.isFinite(v)?v:(x.displayValue??0);}}return 0;}
function row(e){const t=e.team||{},s=e.stats||[];return{name:t.shortDisplayName||t.displayName||t.abbreviation||"—",logo:t.logos?.[0]?.href||t.logo||"",rank:statBy(s,["rank"])||0,pld:statBy(s,["gamesplayed","games"]),w:statBy(s,["wins"]),d:statBy(s,["ties","draws"]),l:statBy(s,["losses"]),gf:statBy(s,["pointsfor","goalsfor"]),ga:statBy(s,["pointsagainst","goalsagainst"]),gd:statBy(s,["pointdifferential","goaldifference"]),pts:statBy(s,["points","total"])||(statBy(s,["wins"])*3+statBy(s,["ties","draws"]))};}

function card(ev){
  const c=ev.competitions?.[0];if(!c)return"";const cs=c.competitors||[];
  const h=cs.find(x=>x.homeAway==="home")||cs[0]||{},a=cs.find(x=>x.homeAway==="away")||cs[1]||{};
  const st=ev.status?.type||{},state=st.state,live=state==="in",detail=st.shortDetail||st.detail||"";
  const tb=(x,side)=>{const t=x.team||{};let cl="";if(state==="post")cl=x.winner?"win":"lose";
    return `<div class="team ${side}"><div class="row">${img(t.logos?.[0]?.href||t.logo)}<span class="nm ${cl}">${esc(t.shortDisplayName||t.displayName||"—")}</span></div><span class="ab">${esc(t.abbreviation||"")}</span></div>`;};
  let center;
  if(state==="pre"){center=`<div class="center"><div class="score" style="font-size:15px;color:var(--muted)">${fmt(new Date(ev.date))}</div><div class="clock">${esc((st.detail||"").includes(":")?"":st.shortDetail||"")||"angesetzt"}</div></div>`;}
  else{center=`<div class="center"><div class="score"><span>${esc(h.score??0)}</span><span class="sep">:</span><span>${esc(a.score??0)}</span></div><div class="clock ${live?"live":""}">${live?'<span class="pulse"></span>':""}${esc(detail)}</div></div>`;}
  return `<div class="match ${live?"islive":""}">${tb(h,"home")}${center}${tb(a,"away")}</div>`;
}

function dateLabel(){
  const wd=selDate.toLocaleDateString("de-CH",{weekday:"long"});
  const dm=selDate.toLocaleDateString("de-CH",{day:"numeric",month:"long"});
  return {main:(isToday(selDate)?"Heute":wd), sub:dm};
}
function renderDateBar(){
  const l=dateLabel();
  $("#dlabel").innerHTML=`${l.main}<span class="sub" id="dsub">${l.sub}</span>`;
  $("#today").classList.toggle("hide",isToday(selDate));
  const d0=new Date(selDate);d0.setDate(d0.getDate()-1);
  const d1=new Date(selDate);d1.setDate(d1.getDate()+1);
  $("#prev").classList.toggle("off",ymd(d0)<ymd(WM_START));
  $("#next").classList.toggle("off",ymd(d1)>ymd(WM_END));
}

function render(){
  renderDateBar();
  const evs=lastGood.events||[];
  const L=evs.filter(e=>e.status?.type?.state==="in");
  const O=evs.filter(e=>e.status?.type?.state!=="in").sort((a,b)=>new Date(a.date)-new Date(b.date));
  $("#live-wrap").innerHTML=L.length?`<div class="eyebrow"><span class="live-tag"><span class="pulse"></span>Live jetzt</span><span class="rule"></span></div>`+L.map(card).join(""):"";
  const dw=$("#day-wrap"),lab=dateLabel();
  const head=`<div class="eyebrow">${esc(lab.main)} · ${esc(lab.sub)}<span class="rule"></span></div>`;
  if(O.length)dw.innerHTML=head+O.map(card).join("");
  else if(!L.length)dw.innerHTML=head+`<div class="empty">Keine Spiele an diesem Tag.<br>Mit ‹ › einen anderen Tag wählen.</div>`;
  else dw.innerHTML="";
  const gw=$("#groups"),g=lastGood.groups||[];
  gw.innerHTML=g.length?g.map(gtable).join(""):`<div class="empty" style="grid-column:1/-1">Gruppentabellen gerade nicht abrufbar.</div>`;
}
function gtable(g){
  const rows=g.rows.map((r,i)=>{const q=i===0?"q1":(i===1?"q2":"");
    return `<tr class="${q}"><td class="team"><span class="pos">${i+1}</span>${img(r.logo).replace('class="logo"','')}<span>${esc(r.name)}</span></td><td class="num">${r.pld}</td><td class="num">${r.w}-${r.d}-${r.l}</td><td class="num">${r.gf}:${r.ga}</td><td class="num">${r.gd>0?"+":""}${r.gd}</td><td class="pts">${r.pts}</td></tr>`;}).join("");
  return `<div class="grp"><h3>${esc(g.name)}</h3><table><thead><tr><th class="team">Team</th><th>Sp</th><th>S-U-N</th><th>Tore</th><th>TD</th><th>Pkt</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function setStatus(ok,p){const d=$("#sdot"),t=$("#stext");if(!ok){d.className="dot err";t.textContent="API nicht erreichbar — letzter Stand";return;}d.className="dot";t.textContent="aktualisiert "+fmt(new Date())+(p?" · Tabellen folgen":"");}

function shift(n){const d=new Date(selDate);d.setDate(d.getDate()+n);if(ymd(d)<ymd(WM_START)||ymd(d)>ymd(WM_END))return;selDate=d;lastGood.events=null;load(true);}
$("#prev").onclick=()=>shift(-1);
$("#next").onclick=()=>shift(1);
$("#today").onclick=()=>{selDate=new Date();lastGood.events=null;load(true);};
function view(w){const l=w==="live";$("#view-live").classList.toggle("hide",!l);$("#view-groups").classList.toggle("hide",l);$("#tab-live").classList.toggle("on",l);$("#tab-groups").classList.toggle("on",!l);}
$("#tab-live").onclick=()=>view("live");$("#tab-groups").onclick=()=>view("groups");$("#refresh").onclick=()=>load(true);
function start(){clearInterval(timer);timer=setInterval(()=>{if(document.hidden)return;if(--countdown<=0)load(false);},1000);}
document.addEventListener("visibilitychange",()=>{if(!document.hidden)load(false);});
clampToday();load(true);start();
</script>
</body>
</html>
