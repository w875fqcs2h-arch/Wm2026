<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WM 2026 · Live</title>
<style>
  :root{
    --bg:#0B0E10;--panel:#14181C;--panel-2:#191E23;--line:#232A30;
    --chalk:#F2F4F3;--muted:#8A969E;--muted-2:#5B656C;
    --live:#FF3B30;--gold:#E0B243;--qual:#2E7D5B;
    --shadow:0 1px 0 rgba(255,255,255,.03),0 12px 30px rgba(0,0,0,.45);
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sys:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--chalk);font-family:var(--sys);}
  body{padding:env(safe-area-inset-top) max(14px,env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-right));max-width:760px;margin:0 auto;-webkit-font-smoothing:antialiased;}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 72%,transparent);padding:14px 0 10px;display:flex;align-items:center;gap:12px;}
  .wordmark{font-weight:800;letter-spacing:.14em;font-size:13px;text-transform:uppercase;line-height:1;}
  .wordmark small{display:block;color:var(--muted);font-weight:600;letter-spacing:.22em;font-size:9.5px;margin-top:3px;}
  .status{margin-left:auto;text-align:right;font-size:11px;color:var(--muted);line-height:1.5;max-width:200px;}
  .status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--qual);margin-right:5px;vertical-align:middle;}
  .status .dot.err{background:var(--live);}
  .status .dot.busy{background:var(--gold);animation:pulse 1s infinite;}
  #refresh{border:1px solid var(--line);background:var(--panel);color:var(--chalk);width:36px;height:36px;border-radius:10px;font-size:16px;cursor:pointer;flex:none;display:grid;place-items:center;transition:transform .4s ease,background .15s;}
  #refresh:active{background:var(--panel-2);}
  #refresh.spin{transform:rotate(360deg);}
  .seg{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:4px;margin:4px 0 18px;}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-family:var(--sys);font-weight:700;font-size:13px;padding:9px 0;border-radius:9px;cursor:pointer;}
  .seg button.on{background:var(--panel-2);color:var(--chalk);box-shadow:var(--shadow);}
  .eyebrow{display:flex;align-items:center;gap:9px;margin:26px 2px 12px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .eyebrow:first-of-type{margin-top:6px;}
  .eyebrow .rule{flex:1;height:1px;background:var(--line);}
  .eyebrow .live-tag{color:var(--live);display:inline-flex;align-items:center;gap:6px;}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.35;transform:scale(.7);}}
  .match{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 14px;margin-bottom:9px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
  .match.islive{border-color:#3a2424;background:linear-gradient(180deg,#181113,var(--panel));}
  .team{display:flex;flex-direction:column;gap:3px;min-width:0;}
  .team.away{align-items:flex-end;text-align:right;}
  .team .nm{font-weight:700;font-size:15px;line-height:1.2;}
  .nm.win{color:var(--chalk);}.nm.lose{color:var(--muted);}
  .center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:84px;padding:0 4px;}
  .score{font-family:var(--mono);font-weight:700;font-size:27px;letter-spacing:.04em;font-variant-numeric:tabular-nums;line-height:1;display:flex;gap:7px;align-items:baseline;}
  .score .sep{color:var(--muted-2);font-size:18px;}
  .clock{font-family:var(--mono);font-size:11px;margin-top:8px;color:var(--muted);letter-spacing:.04em;display:inline-flex;align-items:center;gap:5px;}
  .clock.live{color:var(--live);}.clock.live .pulse{width:6px;height:6px;}
  .kick{font-family:var(--mono);font-size:16px;color:var(--muted);}
  .groups{display:grid;grid-template-columns:1fr;gap:14px;}
  @media(min-width:560px){.groups{grid-template-columns:1fr 1fr;}}
  .grp{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
  .grp h3{margin:0;padding:11px 13px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);font-weight:700;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 5px;text-align:center;}
  th{font-size:9.5px;letter-spacing:.05em;color:var(--muted-2);font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--line);}
  th.team,td.team{text-align:left;padding-left:13px;}
  td.team{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;}
  td.pts{font-family:var(--mono);font-weight:700;font-variant-numeric:tabular-nums;color:var(--chalk);}
  td.num{font-family:var(--mono);color:var(--muted);font-variant-numeric:tabular-nums;}
  tbody tr{border-bottom:1px solid rgba(35,42,48,.5);}
  tbody tr:last-child{border-bottom:0;}
  tbody tr.q1 td:first-child{box-shadow:inset 3px 0 0 var(--gold);}
  tbody tr.q2 td:first-child{box-shadow:inset 3px 0 0 var(--qual);}
  .pos{font-family:var(--mono);color:var(--muted-2);font-size:11px;margin-right:8px;}
  .empty{border:1px dashed var(--line);border-radius:14px;padding:22px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.5;}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:14px 2px 0;font-size:11px;color:var(--muted);}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle;}
  .hide{display:none;}
  footer{margin-top:30px;text-align:center;color:var(--muted-2);font-size:10.5px;line-height:1.6;}
</style>
</head>
<body>
<header>
  <div class="wordmark">WM 2026<small>USA · CAN · MEX</small></div>
  <div class="status" id="status"><span class="dot busy" id="sdot"></span><span id="stext">suche live …</span></div>
  <button id="refresh" title="Jetzt aktualisieren" aria-label="Aktualisieren">↻</button>
</header>

<div class="seg" role="tablist">
  <button id="tab-live" class="on">Live &amp; Heute</button>
  <button id="tab-groups">Gruppen</button>
</div>

<section id="view-live">
  <div id="live-wrap"></div>
  <div id="today-wrap"></div>
</section>

<section id="view-groups" class="hide">
  <div class="groups" id="groups"></div>
  <div class="legend">
    <span><i style="background:var(--gold)"></i>Gruppenerster</span>
    <span><i style="background:var(--qual)"></i>Gruppenzweiter</span>
  </div>
</section>

<footer>
  Live-Daten über Claudes Websuche · Spiele alle 60&nbsp;Sek., Tabellen alle 5&nbsp;Min.<br>
  Läuft direkt auf dem iPhone. So aktuell wie die Suche — meist auf 1&nbsp;Min. genau.
</footer>

<script>
const API="https://api.anthropic.com/v1/messages";
const MODEL="claude-sonnet-4-6";
const MATCH_MS=60000, STAND_MS=300000;
let lastGood={matches:null,groups:null};
let mTimer=null,sTimer=null,busy=false;

const $=s=>document.querySelector(s);
const esc=s=>(s??"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const nowHM=()=>new Date().toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"});

async function ask(prompt){
  const r=await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:MODEL,max_tokens:1000,
      messages:[{role:"user",content:prompt}],
      tools:[{type:"web_search_20250305",name:"web_search"}]
    })});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const data=await r.json();
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  return extractJSON(text);
}
function extractJSON(t){
  if(!t) throw new Error("leer");
  const a=t.indexOf("{"), b=t.lastIndexOf("}");
  if(a<0||b<0) throw new Error("kein JSON");
  return JSON.parse(t.slice(a,b+1));
}

const MATCH_PROMPT=`Heutiges Datum: 13. Juni 2026. Suche im Web den aktuellen Stand ALLER heute laufenden und heute angesetzten Spiele der FIFA WM 2026 (Männer, USA/Kanada/Mexiko).
Gib AUSSCHLIESSLICH ein JSON-Objekt zurueck, kein Text, kein Markdown, exakt so:
{"asOf":"HH:MM","matches":[{"h":"Heimteam","a":"Auswaertsteam","hs":Zahl_oder_null,"as":Zahl_oder_null,"st":"live","min":"63'"}]}
st ist "live" (laeuft gerade), "ft" (beendet) oder "upcoming" (noch nicht angepfiffen).
Bei upcoming: hs und as = null, min = Anstosszeit z.B. "21:00". Bei live: aktuelle Spielminute in min. Bei ft: min="FT".
Nur Spiele von heute, 13. Juni 2026. Antworte NUR mit dem JSON.`;

const STAND_PROMPT=`Heutiges Datum: 13. Juni 2026. Suche im Web die aktuellen Gruppentabellen der FIFA WM 2026 (Gruppen A bis L).
Gib AUSSCHLIESSLICH ein kompaktes JSON-Objekt zurueck, kein Text, kein Markdown, exakt so:
{"groups":[{"g":"A","rows":[["Team",Sp,S,U,N,Tore,Gegentore,Diff,Punkte]]}]}
Jede Zeile pro Team genau in dieser Reihenfolge: [Name, Spiele, Siege, Unentschieden, Niederlagen, erzielteTore, Gegentore, Tordifferenz, Punkte].
Sortiere jede Gruppe nach Platzierung (Erster zuerst). Nur Gruppen mit verfuegbaren Daten. Antworte NUR mit dem JSON.`;

async function loadMatches(){
  try{ const j=await ask(MATCH_PROMPT); if(j&&Array.isArray(j.matches)) lastGood.matches=j.matches; return true; }
  catch(e){ return false; }
}
async function loadStandings(){
  try{ const j=await ask(STAND_PROMPT); if(j&&Array.isArray(j.groups)) lastGood.groups=j.groups; return true; }
  catch(e){ return false; }
}

function setStatus(state,msg){
  const dot=$("#sdot"),txt=$("#stext");
  dot.className="dot"+(state==="err"?" err":state==="busy"?" busy":"");
  txt.textContent=msg;
}

async function refreshAll(manual){
  if(busy) return; busy=true;
  if(manual){const b=$("#refresh");b.classList.add("spin");setTimeout(()=>b.classList.remove("spin"),500);}
  setStatus("busy","suche live im Web …");
  const [okm,oks]=await Promise.all([loadMatches(),loadStandings()]);
  render();
  if(!okm&&!oks) setStatus("err","Suche fehlgeschlagen — letzter Stand");
  else setStatus("ok","aktualisiert "+nowHM());
  busy=false;
}
async function refreshMatchesOnly(){
  if(busy) return; busy=true; setStatus("busy","aktualisiere Spiele …");
  const ok=await loadMatches(); render();
  setStatus(ok?"ok":"err",ok?"aktualisiert "+nowHM():"Spiele-Update fehlgeschlagen");
  busy=false;
}

/* ---- render ---- */
function matchCard(m){
  const live=m.st==="live", ft=m.st==="ft", up=m.st==="upcoming";
  let hc="",ac="";
  if(ft){ const h=+m.hs,a=+m.as; hc=h>a?"win":(h<a?"lose":""); ac=a>h?"win":(a<h?"lose":""); }
  const team=(nm,cls,side)=>`<div class="team ${side}"><span class="nm ${cls}">${esc(nm)}</span></div>`;
  let center;
  if(up){
    center=`<div class="center"><div class="kick">${esc(m.min||"—")}</div><div class="clock">heute</div></div>`;
  }else{
    center=`<div class="center"><div class="score"><span>${esc(m.hs??0)}</span><span class="sep">:</span><span>${esc(m.as??0)}</span></div>
      <div class="clock ${live?"live":""}">${live?'<span class="pulse"></span>':""}${esc(ft?"Beendet":(m.min||""))}</div></div>`;
  }
  return `<div class="match ${live?"islive":""}">${team(m.h,hc,"home")}${center}${team(m.a,ac,"away")}</div>`;
}
function render(){
  const ms=lastGood.matches||[];
  const liveM=ms.filter(m=>m.st==="live");
  const otherM=ms.filter(m=>m.st!=="live");
  const lw=$("#live-wrap"),tw=$("#today-wrap");
  lw.innerHTML = liveM.length ? `<div class="eyebrow"><span class="live-tag"><span class="pulse"></span>Live jetzt</span><span class="rule"></span></div>`+liveM.map(matchCard).join("") : "";
  if(otherM.length){
    tw.innerHTML=`<div class="eyebrow">Heute<span class="rule"></span></div>`+otherM.map(matchCard).join("");
  }else if(!liveM.length){
    tw.innerHTML=`<div class="eyebrow">Heute<span class="rule"></span></div><div class="empty">${lastGood.matches?"Heute keine Spiele gefunden.":"Lade Spiele …"}<br>Schau in den Gruppen-Tab.</div>`;
  }else tw.innerHTML="";

  const gw=$("#groups"),gs=lastGood.groups||[];
  gw.innerHTML = gs.length ? gs.map(groupTable).join("")
    : `<div class="empty" style="grid-column:1/-1">${lastGood.groups?"Keine Tabellendaten.":"Lade Tabellen …"}</div>`;
}
function groupTable(g){
  const rows=(g.rows||[]).map((r,i)=>{
    const q=i===0?"q1":(i===1?"q2":"");
    const gd=+r[7]; const gds=(gd>0?"+":"")+gd;
    return `<tr class="${q}"><td class="team"><span class="pos">${i+1}</span>${esc(r[0])}</td>
      <td class="num">${esc(r[1])}</td><td class="num">${esc(r[2])}-${esc(r[3])}-${esc(r[4])}</td>
      <td class="num">${esc(r[5])}:${esc(r[6])}</td><td class="num">${gds}</td><td class="pts">${esc(r[8])}</td></tr>`;
  }).join("");
  return `<div class="grp"><h3>Gruppe ${esc(g.g)}</h3><table><thead><tr>
    <th class="team">Team</th><th>Sp</th><th>S-U-N</th><th>Tore</th><th>TD</th><th>Pkt</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ---- tabs / timers ---- */
function showView(w){const l=w==="live";$("#view-live").classList.toggle("hide",!l);$("#view-groups").classList.toggle("hide",l);$("#tab-live").classList.toggle("on",l);$("#tab-groups").classList.toggle("on",!l);}
$("#tab-live").onclick=()=>showView("live");
$("#tab-groups").onclick=()=>showView("groups");
$("#refresh").onclick=()=>refreshAll(true);

function startTimers(){
  clearInterval(mTimer);clearInterval(sTimer);
  mTimer=setInterval(()=>{if(!document.hidden)refreshMatchesOnly();},MATCH_MS);
  sTimer=setInterval(()=>{if(!document.hidden)loadStandings().then(render);},STAND_MS);
}
document.addEventListener("visibilitychange",()=>{if(!document.hidden&&!busy)refreshMatchesOnly();});

refreshAll(false);
startTimers();
</script>
</body>
</html>
